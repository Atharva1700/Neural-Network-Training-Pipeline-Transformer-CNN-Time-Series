version: '3.8'

services:
  # API Service
  api:
    build: .
    container_name: neural-network-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/cache
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ml-network

  # MLflow Tracking Server
  mlflow:
    build: .
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///app/mlruns
    restart: unless-stopped
    networks:
      - ml-network

  # Training Job (run once)
  training:
    build: .
    container_name: model-training
    volumes:
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
    command: python train_pipeline.py
    profiles:
      - training
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  models:
  mlruns:
